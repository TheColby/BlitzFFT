<text x="110" y="34" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#111827">Estimated Exact FFT Execution Time vs Signal Length</text>
<text x="110" y="60" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#4b5563">384 kHz mono whole-file FFTs. The 1-hour anchor is simulated from the measured 48 kHz run; the rest use N log2 N scaling.</text>

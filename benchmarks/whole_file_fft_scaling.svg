<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="860" viewBox="0 0 1320 860" role="img" aria-labelledby="title desc">
<title id="title">Estimated whole-file FFT execution time vs signal length</title>
<desc id="desc">Log-scale chart of estimated execution time for BlitzFFT exact-real, RealFFT, PocketFFT, FFTW3f, RustFFT complex, and KissFFT from one minute to seventy-two hours at 384 kHz, extrapolated from a simulated one-hour anchor using N log2 N scaling.</desc>

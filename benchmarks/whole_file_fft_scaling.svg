<text x="110" y="58" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#4b5563">48 kHz mono whole-file FFTs; curves extrapolated from the measured 1-hour benchmark with T_est(N) = T(N0) * N log2 N / (N0 log2 N0)</text>

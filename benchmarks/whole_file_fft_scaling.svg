<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" role="img" aria-labelledby="title desc">
<title id="title">Estimated whole-file FFT execution time vs signal length</title>
<desc id="desc">Log-scale chart of estimated execution time for BlitzFFT exact-real, RealFFT, PocketFFT, FFTW3f, RustFFT complex, and KissFFT from one minute to seventy-two hours at 48 kHz, extrapolated from the measured one-hour benchmark using N log2 N scaling.</desc>
